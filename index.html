function filter(){return D.filter(r=>{if(fDir&&r.d!==fDir)return false;if(fAsp==='M'&&r.a!=='M')return false;if(fAsp==='PL'&&r.a!=='PL')return false;if(fLoc&&r.l!==fLoc)return false;if(q){const h=[r.l,r.s,r.r,r.t,r.i].join(' ').toLowerCase();if(!h.includes(q))return false;}return true;});}
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hl(t,q){if(!q)return e(t);return e(t).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}
function ic(i){if(!i||i==='-----')return 'i0';if(/^Position/i.test(i))return 'i1';if(/\(SI\)/.test(i))return 'i2';if(/\(MI\)/.test(i))return 'i3';return 'i4';}
function render(){
  const data=filter();const map={},ord=[];
  for(const r of data){if(!map[r.l]){map[r.l]=[];ord.push(r.l);}map[r.l].push(r);}
  document.getElementById('ss').textContent=new Set(data.map(r=>r.s)).size;
  document.getElementById('sr').textContent=data.length;
  document.getElementById('sl').textContent=ord.length;
  const ct=document.getElementById('content');
  if(!data.length){ct.innerHTML='<div class="empty"><div class="empty-icon">⊘</div><p>No signals match</p></div>';return;}
  let h='';
  for(const loc of ord){
    const rows=map[loc];const mile=rows[0].m;
    const sm={},so=[];
    for(const r of rows){if(!sm[r.s]){sm[r.s]=[];so.push(r.s);}sm[r.s].push(r);}
    let body='';
    for(const sig of so){
      const sr=sm[sig];const dir=sr[0].d;
      const db=dir==='DN'?'<span class="dirtag dn">↓ DN</span>':'<span class="dirtag up">↑ UP</span>';
      let rh='';
      for(const r of sr){
        const ab=r.a==='M'?'<span class="asp m">Main</span>':'<span class="asp p">PL</span>';
        rh+=`<div class="rr"><div class="rl">${hl(r.r,q)}</div><div class="rd">${hl(r.t,q)}</div><div class="rright">${ab}<span class="ind ${ic(r.i)}">${hl(r.i,q)}</span></div></div>`;
      }
      body+=`<div class="sg"><div class="sgh"><span class="sid">${hl(sig,q)}</span>${db}</div>${rh}</div>`;
    }
    h+=`<div class="lb${col.has(loc)?' col':''}" data-loc="${e(loc)}"><div class="lh"><span class="lchev">▼</span><span class="ln">${hl(loc,q)}</span><span class="lm">${mile}</span><span class="lct">${rows.length}</span></div><div class="lbody">${body}</div></div>`;
  }
  ct.innerHTML=h;
  ct.querySelectorAll('.lh').forEach(h=>{h.addEventListener('click',()=>{const b=h.closest('.lb');const loc=b.dataset.loc;b.classList.toggle('col');col.has(loc)?col.delete(loc):col.add(loc);});});
}
function setChips(){
  document.getElementById('c-all').classList.toggle('on',!fDir&&!fAsp&&!fLoc);
  document.getElementById('c-dn').classList.toggle('on',fDir==='DN');
  document.getElementById('c-up').classList.toggle('on',fDir==='UP');
  document.getElementById('c-mn').classList.toggle('on',fAsp==='M');
  document.getElementById('c-pl').classList.toggle('on',fAsp==='PL');
  document.getElementById('c-lc').classList.toggle('on',!!fLoc);
}
document.getElementById('c-all').onclick=()=>{fDir='';fAsp='';fLoc='';document.getElementById('c-lc').textContent='📍 Location';setChips();render();};
document.getElementById('c-dn').onclick=()=>{fDir=fDir==='DN'?'':'DN';setChips();render();};
document.getElementById('c-up').onclick=()=>{fDir=fDir==='UP'?'':'UP';setChips();render();};
document.getElementById('c-mn').onclick=()=>{fAsp=fAsp==='M'?'':'M';setChips();render();};
document.getElementById('c-pl').onclick=()=>{fAsp=fAsp==='PL'?'':'PL';setChips();render();};
document.getElementById('c-lc').onclick=openSheet;
document.getElementById('q').addEventListener('input',ev=>{q=ev.target.value.trim().toLowerCase();render();});
const LOCS=[...new Set(D.map(r=>r.l))];
function openSheet(){
  const list=document.getElementById('sheet-list');
  list.innerHTML=`<div class="sheet-item${!fLoc?' sel':''}" data-loc=""><div><div class="item-name">All Locations</div></div>${!fLoc?'<span class="item-check">✓</span>':''}</div>`+LOCS.map(loc=>{const m=D.find(r=>r.l===loc).m;const s=fLoc===loc;return `<div class="sheet-item${s?' sel':''}" data-loc="${e(loc)}"><div><div class="item-name">${e(loc)}</div><div class="item-mile">${m}</div></div>${s?'<span class="item-check">✓</span>':''}</div>`;}).join('');
  list.querySelectorAll('.sheet-item').forEach(item=>{item.addEventListener('click',()=>{fLoc=item.dataset.loc;document.getElementById('c-lc').textContent=fLoc?'📍 '+fLoc.substring(0,18):'📍 Location';closeSheet();setChips();render();});});
  document.getElementById('overlay').classList.add('open');
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');}
document.getElementById('sheet-close').addEventListener('click',closeSheet);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeSheet();});
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
window.addEventListener('resize',fit);
fit();setChips();render();
</script>
</body>
</html>
